[general]
# Renice game processes for better CPU scheduling
renice=5
# Prevent screensaver/display blanking during gameplay
inhibit_screensaver=1

[gpu]
# Enable AMD GPU performance optimizations.
# "accept-responsibility" acknowledges that forcing max performance
# increases power draw and heat — appropriate for a gaming session.
apply_gpu_optimisations=accept-responsibility
gpu_device=0

# Force the amdgpu DPM performance level to "high".
# Keeps clocks pinned instead of ramping up and down during gameplay,
# which avoids frame-time spikes on RDNA cards.
amd_performance_level=high

[cpu]
# Do not park (disable) cores — keep all cores available.
park_cores=no
# Pin game processes to the same physical cores to reduce cache misses.
pin_cores=yes
