[general]
renice=5
inhibit_screensaver=1

[gpu]
# "accept-responsibility" acknowledges max-perf increases power/heat.
apply_gpu_optimisations=accept-responsibility
gpu_device=0

# Pin DPM "high" — avoids frame-time spikes from clock ramping on RDNA.
amd_performance_level=high

[cpu]
park_cores=no
# Pin to the same physical cores to reduce cache misses.
pin_cores=yes
