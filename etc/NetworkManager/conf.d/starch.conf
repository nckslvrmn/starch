# starch — NetworkManager as a passive connectivity monitor.
#
# The actual network is managed by systemd-networkd (wired/DHCP) and iwd
# (WiFi).  NM is only here because Steam checks connectivity via NM's
# D-Bus interface (org.freedesktop.NetworkManager).
#
# With these settings NM will:
#   1. See interfaces that networkd/iwd already configured
#   2. Create "external" connection objects for them (read-only)
#   3. Run periodic connectivity checks against those connections
#   4. Report NM_STATE_CONNECTED_GLOBAL on D-Bus → Steam is happy
#
# NM will NOT:
#   - Run DHCP or touch IP configuration (networkd owns that)
#   - Create automatic connection profiles
#   - Interfere with iwd's WiFi management

[main]
# Don't auto-create connection profiles for any interface.
# Without this, NM tries to DHCP on every managed device, fighting networkd.
no-auto-default=*

# keyfile is the only storage backend we need (no ifcfg-rh, etc.)
plugins=keyfile

[connectivity]
# Lightweight connectivity check so NM can tell Steam we're online.
uri=http://nmcheck.gnome.org/check_network_status.txt
interval=300
