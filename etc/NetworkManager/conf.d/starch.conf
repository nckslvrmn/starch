# NetworkManager runs as a passive connectivity monitor only. The actual
# network is owned by systemd-networkd (wired) and iwd (WiFi); NM is here
# because Steam's online check queries NM's D-Bus interface. These options
# stop NM from DHCP-ing on top of networkd or creating profiles of its own.

[main]
no-auto-default=*
plugins=keyfile

[connectivity]
uri=http://nmcheck.gnome.org/check_network_status.txt
interval=300
