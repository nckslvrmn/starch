# 70-starch-gaming.rules — Input device permissions for gaming
#
# Steam ships /usr/lib/udev/rules.d/60-steam-input.rules which handles
# detailed controller matching. This file handles the lower-level
# permissions needed for Steam Input and virtual controllers to work.
#
# Requirements:
#   - User must be in the 'input' group
#   - uinput kernel module must be loaded (see /etc/modules-load.d/starch-uinput.conf)

# uinput — virtual input device interface used by Steam Input for
# virtual gamepad, keyboard, and mouse remapping.
KERNEL=="uinput", SUBSYSTEM=="misc", GROUP="input", MODE="0660", TAG+="uaccess"

# Raw input event devices — required for gamepad access before Steam
# has registered the device with its own udev rules.
KERNEL=="event*", SUBSYSTEM=="input", GROUP="input", MODE="0660", TAG+="uaccess"

# Joystick and gamepad nodes
KERNEL=="js*", SUBSYSTEM=="input", GROUP="input", MODE="0660", TAG+="uaccess"

# hidraw — needed for DualShock 4 / DualSense / Xbox Series controllers
# to send/receive HID reports (rumble, LED, gyro, adaptive triggers).
# Sony (054c), Microsoft (045e), Nintendo (057e), 8BitDo (2dc8)
KERNEL=="hidraw*", SUBSYSTEM=="hidraw", ATTRS{idVendor}=="054c", GROUP="input", MODE="0660", TAG+="uaccess"
KERNEL=="hidraw*", SUBSYSTEM=="hidraw", ATTRS{idVendor}=="045e", GROUP="input", MODE="0660", TAG+="uaccess"
KERNEL=="hidraw*", SUBSYSTEM=="hidraw", ATTRS{idVendor}=="057e", GROUP="input", MODE="0660", TAG+="uaccess"
KERNEL=="hidraw*", SUBSYSTEM=="hidraw", ATTRS{idVendor}=="2dc8", GROUP="input", MODE="0660", TAG+="uaccess"

# Nintendo GameCube USB Adapter — direct libusb access for Dolphin.
# Matches the USB device node (not HID), which is what Dolphin opens via libusb.
# The usbhid quirk in modprobe.d/gcadapter.conf prevents the kernel from
# claiming this device so Dolphin can use it exclusively.
SUBSYSTEM=="usb", ENV{DEVTYPE}=="usb_device", ATTRS{idVendor}=="057e", ATTRS{idProduct}=="0337", GROUP="input", MODE="0660", TAG+="uaccess"
