vm.swappiness=10

# Steam monitors a large number of files; the default (8192) is too low.
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=512

# Proton/WINE create many memory-mapped regions; default trips ENOMEM.
vm.max_map_count=2147483642

# Uncap the realtime-runtime reserve so gamescope --rt (SCHED_RR) is not
# throttled. Default reserves 5% of each period for non-RT, causing
# compositor stalls under load.
kernel.sched_rt_runtime_us=-1

# Don't trap on x86 split-lock atomics. Some games and anti-cheat DLLs hit
# split locks; the kernel's default response (warn + 10ms sleep) stutters.
kernel.split_lock_mitigate=0

# Disable proactive background memory compaction (frame-time hitches on
# long sessions). On-demand compaction at allocation time still runs.
vm.compaction_proactiveness=0
