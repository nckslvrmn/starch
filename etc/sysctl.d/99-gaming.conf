# 99-starch-gaming.conf — Kernel parameter tuning for gaming

# Keep more data in RAM instead of swapping to disk.
# A gaming system should never be paging game data out to disk.
vm.swappiness=10

# Steam monitors a large number of game files with inotify.
# The default limit (8192) is too low and Steam will log errors.
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=512

# Some games and Proton/WINE applications create large numbers of
# memory-mapped regions. Increase the limit to avoid ENOMEM errors.
vm.max_map_count=2147483642
