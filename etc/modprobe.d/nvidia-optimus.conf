# starch-nvidia-optimus.conf — NVIDIA kernel module options for Optimus laptops
#
# Target: Dell Precision 5550 and similar MUX-less Optimus systems where the
# Intel iGPU owns all display outputs (eDP + HDMI via the iGPU pipe) and the
# NVIDIA dGPU is used only for render offload via PRIME.
#
# Note: nvidia-drm.modeset=1 must still be present in the kernel cmdline for
# PRIME render offload and GBM to work. This file handles the remaining
# module options that cannot be set there.

# Do NOT take over fbcon on Optimus systems — the Intel iGPU is the primary
# display controller and already owns the framebuffer console. Letting nvidia
# also register as the fbdev provider fights with i915 and produces a black
# screen or flickering console during early boot.
options nvidia-drm fbdev=0

# Use the Page Attribute Table for VRAM mappings — improves memory performance,
# particularly for Vulkan workloads under PRIME offload.
options nvidia NVreg_UsePageAttributeTable=1

# Preserve video memory contents across system suspend/resume.
# REQUIRED for suspend-to-RAM and hibernate to work correctly on NVIDIA.
# You must also enable the three nvidia power management services:
#   systemctl enable nvidia-suspend nvidia-hibernate nvidia-resume
options nvidia NVreg_PreserveVideoMemoryAllocations=1

# Runtime power management — let the dGPU enter D3cold when idle.
# 0x02 = "coarse-grained" (dGPU fully powers off when not in use by any client).
# Combined with the systemd-udev rule shipped with nvidia-utils, this lets the
# T2000 sleep whenever no app has an active PRIME offload context, saving
# significant battery life on laptops.
options nvidia NVreg_DynamicPowerManagement=0x02

# Use /var/tmp for NVIDIA temporary files (persists across reboots).
options nvidia NVreg_TemporaryFilePath=/var/tmp
