# Target: MUX-less Optimus systems where the Intel iGPU owns all display
# outputs and the NVIDIA dGPU does PRIME render offload.
# nvidia_drm.modeset=1 must still be on the kernel cmdline.

# fbdev=0: i915 already owns the framebuffer console on Optimus; letting
# nvidia register as fbdev too fights with i915 and produces a black or
# flickering early-boot console.
options nvidia-drm fbdev=0

options nvidia NVreg_UsePageAttributeTable=1

# Preserve VRAM across suspend/resume — required, also needs the
# nvidia-{suspend,hibernate,resume} services enabled.
options nvidia NVreg_PreserveVideoMemoryAllocations=1

# Coarse-grained runtime PM — dGPU enters D3cold when idle so the laptop
# can actually sleep on battery.
options nvidia NVreg_DynamicPowerManagement=0x02

options nvidia NVreg_TemporaryFilePath=/var/tmp
