# starch-amdgpu.conf — AMD GPU kernel module options.
#
# Modern AMD cards (Polaris / Vega / RDNA1+) need no options at all —
# amdgpu auto-claims them and the in-kernel scheduler does the right thing.
# The options below are commented out; uncomment only if you actually need
# them.
#
# Force-enable support for older GCN generations (Southern Islands / Sea
# Islands) that amdgpu refuses to claim by default:
#   options amdgpu si_support=1 cik_support=1
#
# Expose the full power-management feature mask — required if you want to
# tweak DPM clocks via /sys/class/drm/card*/device/pp_* entries:
#   options amdgpu ppfeaturemask=0xffffffff
