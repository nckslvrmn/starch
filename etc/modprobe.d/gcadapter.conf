# Prevent usbhid from claiming the Nintendo GameCube USB Adapter (057e:0337).
#
# Without this, the kernel HID driver grabs the device at plug-in time and
# Dolphin gets "device busy" when it tries to open it via libusb.
#
# HID_QUIRK_IGNORE = 0x0004 — tells usbhid to leave this device alone.
options usbhid quirks=0x057e:0x0337:0x0004
