# starch-nvidia.conf — NVIDIA kernel module options
#
# Note: nvidia-drm.modeset=1 is already set in the systemd-boot kernel cmdline.
# This file handles the remaining module options that cannot be set there.

# Enable the NVIDIA framebuffer console device.
# Required for a proper text console on NVIDIA when DRM modeset is active.
options nvidia-drm fbdev=1

# Use the Page Attribute Table for VRAM mappings.
# Improves memory performance, particularly for Vulkan workloads.
options nvidia NVreg_UsePageAttributeTable=1

# Preserve video memory contents across system suspend/resume.
# REQUIRED for suspend-to-RAM and hibernate to work correctly on NVIDIA.
# You must also enable the three nvidia power management services:
#   systemctl enable nvidia-suspend nvidia-hibernate nvidia-resume
options nvidia NVreg_PreserveVideoMemoryAllocations=1

# Use /var/tmp for NVIDIA temporary files.
# /var/tmp persists across reboots, unlike /tmp which is cleared on boot.
options nvidia NVreg_TemporaryFilePath=/var/tmp
