[general]
# Renice game processes for better CPU scheduling
renice=5
# Prevent screensaver/display blanking during gameplay
inhibit_screensaver=1

[filter]
# Apply gamemode when gamescope requests it.
# gamescope passes the request through to gamemode on behalf of all games.
whitelist=gamescope

[gpu]
# Enable NVIDIA GPU performance optimizations.
# "accept-responsibility" acknowledges that forcing max performance
# increases power draw and heat — appropriate for a gaming session.
apply_gpu_optimisations=accept-responsibility
gpu_device=0

# Force NVIDIA powermizer to maximum performance state.
# Prevents the GPU from downclocking during gameplay, which can cause
# frame time spikes and stuttering.
# 1 = prefer maximum performance
nv_powermizer_mode=1

[cpu]
# Do not park (disable) cores — keep all cores available.
park_cores=no
# Pin game processes to the same physical cores to reduce cache misses.
pin_cores=yes
