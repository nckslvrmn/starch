# starch-nvidia-optimus.conf — Early module loading for Optimus laptops
#
# On Optimus systems the Intel iGPU (i915) is the primary display controller.
# Loading i915 early prevents a black-screen race between i915 and the
# plymouth/fbcon handoff. NVIDIA modules are still loaded early so the
# nvidia-drm render node exists before SDDM and any PRIME-offloaded clients
# attempt to open it.
#
# After deploying this file, rebuild the initramfs:
#   sudo mkinitcpio -P

MODULES=(i915 nvidia nvidia_modeset nvidia_uvm nvidia_drm)
