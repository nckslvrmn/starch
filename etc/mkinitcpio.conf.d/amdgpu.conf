# starch-amdgpu.conf — Early amdgpu KMS loading
#
# Load the amdgpu kernel module in initramfs so KMS is active before SDDM
# starts. This gives a flicker-free handoff from the boot splash to the
# greeter and lets gamescope open the DRM node without a race.
#
# After deploying this file, rebuild the initramfs:
#   sudo mkinitcpio -P

MODULES=(amdgpu)
