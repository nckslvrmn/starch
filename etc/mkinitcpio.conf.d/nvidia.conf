# starch-nvidia.conf — Early NVIDIA module loading
#
# Load all NVIDIA DRM/KMS modules before the display manager starts.
# This ensures the DRM device is fully initialized and ready when greetd
# and gamescope attempt to open it, which is the primary cause of:
#   - Blank screens on session start
#   - Flickering during the first few seconds
#   - gamescope failing to open the DRM device
#
# After deploying this file, rebuild the initramfs:
#   sudo mkinitcpio -P

MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)
